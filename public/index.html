<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Based Race</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
    }
    #game-canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
      object-fit: contain;
      background: #000;
    }
    #ui-overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      font-family: monospace;
      font-size: 16px;
      color: white;
      text-shadow: 1px 1px 2px black;
      z-index: 10;
    }
    #back-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Press Start 2P', cursive;
      background-color: #e7f2eb;
      color: #0f10f4;
      border: none;
      padding: 15px 20px;
      font-size: clamp(10px, 2.5vw, 14px);
      cursor: pointer;
      box-shadow: 4px 4px 0 0 #233e63, 6px 6px 0 0 #99b1c5;
      z-index: 100;
    }
    #back-btn:active {
      transform: translate(-50%, -50%) translate(4px, 4px);
      box-shadow: 0 0 0 0 #233e63, 2px 2px 0 0 #99b1c5;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay">
      <div id="timer">Time: 0.00s</div>
      <div id="status">Loading...</div>
    </div>
    <button id="back-btn" style="display: none;">Back to Menu</button>
  </div>
  <script type="module" src="/js/main.js"></script>
  <script>
    document.getElementById('back-btn').addEventListener('click', () => {
      window.parent.location.reload();
    });
  </script>
</body>
</html>
